name: CI-CD
on:
  push:
    branches: [main]
env:
  AWS_REGION: ap-south-1
  ECR_REPO: devops-demo-app
jobs:
  build-test-scan-push:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install & test
        working-directory: app
        run: |
          npm install
          npm test

      - name: Trivy scan source
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: app
          severity: HIGH,CRITICAL
          exit-code: "0"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::848104065212:role/github-actions-ecr
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        working-directory: app
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build --platform linux/amd64 -t $REGISTRY/$ECR_REPO:$IMAGE_TAG .
          docker push $REGISTRY/$ECR_REPO:$IMAGE_TAG
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPO }}:${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: "0"

      - name: Update Helm values with new image tag
        run: |
          sed -i "s|tag: .*|tag: \"${{ github.sha }}\"|g" helm/values.yaml
          cat helm/values.yaml | grep tag

      - name: Commit and push updated values.yaml
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet helm/values.yaml; then
            echo "No changes to commit"
          else
            git add helm/values.yaml
            git commit -m "ci: deploy ${{ github.sha }} [skip ci]"
            git push
          fi
