name: CI-CD
on:
  push:
    branches: [main]
env:
  AWS_REGION: ap-south-1
  ECR_REPO: devops-demo-app
jobs:
  build-test-scan-push:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install & unit test
        working-directory: app
        run: |
          npm install
          npm test
      - name: Trivy scan source
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: app
          severity: HIGH,CRITICAL
          exit-code: "0"
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::<ACCOUNT_ID>:role/github-actions-ecr
          aws-region: ${{ env.AWS_REGION }}
      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build and push
        working-directory: app
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          TAG: ${{ github.sha }}
        run: |
          docker build -t $REGISTRY/$ECR_REPO:$TAG .
          docker push $REGISTRY/$ECR_REPO:$TAG
      - name: Trivy scan image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPO }}:${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: "0"
      - name: Update image tag in values.yaml (GitOps)
        run: |
          sed -i "s|tag: .*|tag: \"${{ github.sha }}\"|" helm/values.yaml
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git commit -am "ci: deploy ${{ github.sha }} [skip ci]" || echo "no changes"
          git push
